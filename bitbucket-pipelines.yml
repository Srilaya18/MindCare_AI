image: python:3.11

pipelines:
  default:
    - step:
        name: "Lint with flake8"
        caches:
          - pip
        script:
          - pip install flake8
          - flake8 . --count --statistics

    - step:
        name: "Test with pytest"
        caches:
          - pip
        script:
          - pip install -r requirements.txt
          - pytest tests/ -v --tb=short

  branches:
    main:
      - step:
          name: "Lint"
          caches:
            - pip
          script:
            - pip install flake8
            - flake8 . --count --statistics

      - step:
          name: "Test"
          caches:
            - pip
          script:
            - pip install -r requirements.txt
            - pytest tests/ -v --tb=short

      - step:
          name: "Build Docker Image"
          services:
            - docker
          script:
            - docker build -t mindcare-ai:$BITBUCKET_COMMIT .
            - echo "Docker image built successfully"

definitions:
  services:
    docker:
      memory: 2048
